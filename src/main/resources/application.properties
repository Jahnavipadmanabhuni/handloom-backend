# Server
server.port=8080

# MySQL Database - Aiven
spring.datasource.url=jdbc:mysql://mysql-f57c99a-handloom-db.a.aivencloud.com:22401/defaultdb?ssl-mode=REQUIRED
spring.datasource.username=avnadmin
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Aiven SSL
spring.datasource.hikari.data-source-properties.sslMode=REQUIRED
spring.datasource.hikari.data-source-properties.serverSslCert=/tmp/aiven-ca.pem

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=handloom-secret-key-2024-very-long-secret-for-jwt-token-generation
app.jwt.expiration=86400000
spring.security.user.name=admin
spring.security.user.password=admin123

# Logging
logging.level.org.springframework.security=DEBUG
